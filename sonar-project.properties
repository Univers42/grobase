sonar.organization=univers42
sonar.projectKey=Univers42_grobase
sonar.projectName=grobase

sonar.host.url=https://sonarcloud.io

sonar.sources=docker/services,scripts,config,src/apps,src/libs
sonar.tests=
sonar.inclusions=**/*.js,**/*.ts,**/*.sh,**/*.sql,**/*.yml,**/*.yaml,**/*.py

# Base exclusions: deps, build output, IaC Dockerfiles, lockfiles, minified assets.
# Scaffolding exclusions (test/CI/bench harnesses + vendored upstream): these are not
# shipped product code — they are the verify-gate battery, load benchmarks, security-scan
# wrappers, seeders, and the vendored realtime-agnostic workspace. Product code under
# src/**, docker/services/**/src/*.ts, and scripts/*.py stays in scope and is fixed in code.
sonar.exclusions=**/node_modules/**,**/vendor/**,**/sandbox/**,**/dist/**,**/coverage/**,.github/**,src/tools/**,src/Dockerfile,scripts/migrations/**,docker/services/**/Dockerfile,docker/services/vault/scripts/**,**/pnpm-lock.yaml,**/*.min.js,**/*.min.css,scripts/verify/**,scripts/bench/**,scripts/security/**,scripts/env/**,scripts/vault/**,scripts/certs/**,scripts/db/**,scripts/ci/**,scripts/ops/**,scripts/seed/**,scripts/test/**,scripts/lib/**,scripts/*.sh,docker/services/**/*.sh,docker/services/realtime/realtime-agnostic/**

sonar.javascript.file.suffixes=.js
sonar.typescript.file.suffixes=.ts
sonar.python.file.suffixes=.py
# Pin the Python version so analysis is precise (no "compatible with all Python 3
# versions by default" fallback). The .py scripts are dev/CI host helpers run on
# the project's Python 3.12 toolchain; widen this list if older runtimes are added.
sonar.python.version=3.12

sonar.sourceEncoding=UTF-8

# ── Coverage ────────────────────────────────────────────────────────────────
# Reports generated by `make sonar-scan` (jest lcov for src/, deno lcov for the
# functions-runtime). lcov SF paths are prefixed to be project-relative so they
# match Sonar's file keys.
sonar.javascript.lcov.reportPaths=src/coverage/lcov.sonar.info,docker/services/functions-runtime/coverage/deno.lcov.sonar.info
sonar.typescript.lcov.reportPaths=src/coverage/lcov.sonar.info,docker/services/functions-runtime/coverage/deno.lcov.sonar.info
# Coverage is measured on the unit-tested service layer. Entrypoints, DI modules,
# DTOs, controllers, middleware/interceptors, telemetry bootstrap, health wiring,
# the Deno HTTP server, and one-off scripts are exercised by the verify-gate
# integration battery rather than unit tests, so they are excluded from coverage
# measurement (still analyzed for bugs/smells).
sonar.coverage.exclusions=**/main.ts,**/*.module.ts,**/*.dto.ts,**/*.controller.ts,**/*.spec.ts,**/*.test.ts,**/*.interceptor.ts,**/*.middleware.ts,**/tracing/**,**/observability/**,**/health/**,docker/services/functions-runtime/src/server.ts,docker/services/functions-runtime/src/example-function.ts,scripts/deploy/gen-deploy.py

# ── Issue suppressions ────────────────────────────────────────────────────────
# S1313 (hardcoded IP address) is a production-code concern. In *test* fixtures the
# IP literals ARE the test vectors — the SSRF private-address classifier must be
# exercised against 10.0.0.0/8, 169.254.169.254, ::1, fc00::/7, CGNAT, the
# IPv4-mapped-IPv6 metadata bypass, etc. Scope the suppression to spec files only,
# so production code stays fully protected by the rule.
sonar.issue.ignore.multicriteria=t1
sonar.issue.ignore.multicriteria.t1.ruleKey=typescript:S1313
sonar.issue.ignore.multicriteria.t1.resourceKey=**/*.spec.ts
