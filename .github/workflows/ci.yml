# File: .github/workflows/ci.yml
# CI pipeline — shellcheck, Docker builds, integration tests
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger + nightly sweep for the heavy enterprise battery (gates-full).
  # The per-PR path stays fast; the full m103..m145 suite runs once a day + on demand.
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # ─── Job 1: Shellcheck on repo-owned scripts ───────────────────
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Shellcheck repo scripts
        run: |
          set -euo pipefail
          # Lint the repo's own shell scripts: root host-helpers + mini-baas-infra.
          # Robust to a missing root (so a pruned path can't abort under set -e) and
          # prunes third-party/generated trees. Ignored codes: SC1091 (sourced file
          # not followed), SC2034 (unused vars — colour constants), SC1128 (the
          # uniform 42-school header banner above the shebang — cosmetic, scripts are
          # always invoked as `bash <file>` so the shebang line is never honoured).
          roots=()
          for d in scripts mini-baas-infra/scripts; do
            [ -d "$d" ] && roots+=("$d")
          done
          if [ "${#roots[@]}" -eq 0 ]; then
            echo "No script roots present; nothing to lint"; exit 0
          fi
          mapfile -d '' shfiles < <(
            find "${roots[@]}" \
              \( -path '*/vendor/*' -o -path '*/node_modules/*' -o -path '*/__pycache__/*' \) -prune \
              -o -type f -name '*.sh' -print0
          )
          if [ "${#shfiles[@]}" -eq 0 ]; then
            echo "No .sh files found"; exit 0
          fi
          printf '%s\0' "${shfiles[@]}" | xargs -0 shellcheck -S error -e SC1091 -e SC2034 -e SC1128
          echo "shellcheck passed on ${#shfiles[@]} files"

  # ─── Job 2: Docker build for each service ──────────────────────
  # Build contexts live under mini-baas-infra/. NestJS apps build from src/ with
  # an APP build-arg; the Go control plane from go/control-plane/ with APP+PORT;
  # the Rust data plane from its own dir. (The old flat ./docker/services/<svc>
  # layout never existed for these — every run errored "context not found".)
  docker-build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: mongo-api
            context: mini-baas-infra/src
            build-args: |
              APP=mongo-api
          - service: query-router
            context: mini-baas-infra/src
            build-args: |
              APP=query-router
          - service: email-service
            context: mini-baas-infra/src
            build-args: |
              APP=email-service
          - service: storage-router
            context: mini-baas-infra/src
            build-args: |
              APP=storage-router
          - service: adapter-registry
            context: mini-baas-infra/go/control-plane
            build-args: |
              APP=adapter-registry
              PORT=3021
          - service: data-plane-router   # Rust — slow cold build (minutes)
            context: mini-baas-infra/docker/services/data-plane-router
            build-args: ""
          # ── Self-built infra services (42-Inception: our Dockerfile, slim base).
          # These are profile-gated (not booted by the default integration stack),
          # so building each here is the parity gate that a slim Dockerfile actually
          # compiles — a broken FROM/download is a real red, not a false green.
          - service: redis              # alpine + apk redis
            context: mini-baas-infra/docker/services/redis
            build-args: ""
          - service: postgrest          # scratch + static musl release binary
            context: mini-baas-infra/docker/services/postgrest
            build-args: ""
          - service: db-bootstrap       # alpine + postgresql16-client
            context: mini-baas-infra/docker/services/db-bootstrap
            build-args: ""
          - service: mongo-keyfile      # alpine + openssl
            context: mini-baas-infra/docker/services/mongo-keyfile
            build-args: ""
          - service: kong               # debian-slim + official kong .deb
            context: mini-baas-infra/docker/services/kong
            build-args: ""
          - service: gotrue             # Go source build → alpine
            context: mini-baas-infra/docker/services/gotrue
            build-args: ""
          - service: mongo              # debian-slim + mongodb-org apt (glibc)
            context: mini-baas-infra/docker/services/mongo
            build-args: ""
          - service: mongo-init         # debian-slim + mongosh only
            context: mini-baas-infra/docker/services/mongo-init
            build-args: ""
          - service: mysql              # alpine + mariadb (mysql wire)
            context: mini-baas-infra/docker/services/mysql
            build-args: ""
          - service: mariadb            # alpine + mariadb
            context: mini-baas-infra/docker/services/mariadb
            build-args: ""
          - service: minio              # static minio release binary
            context: mini-baas-infra/docker/services/minio
            build-args: ""
          - service: mc                 # static mc release binary
            context: mini-baas-infra/docker/services/mc
            build-args: ""
          - service: cockroach          # static cockroach release binary
            context: mini-baas-infra/docker/services/cockroach
            build-args: ""
          - service: prometheus         # static prometheus release binary
            context: mini-baas-infra/docker/services/prometheus
            build-args: ""
          - service: grafana            # grafana release
            context: mini-baas-infra/docker/services/grafana
            build-args: ""
          - service: loki               # static loki release binary
            context: mini-baas-infra/docker/services/loki
            build-args: ""
          - service: promtail           # static promtail release binary
            context: mini-baas-infra/docker/services/promtail
            build-args: ""
          - service: trino              # temurin-alpine JRE + trino tarball (heavy)
            context: mini-baas-infra/docker/services/trino
            build-args: ""
          - service: debezium           # temurin-alpine JRE + debezium tarball (heavy)
            context: mini-baas-infra/docker/services/debezium
            build-args: ""
          - service: iceberg-rest       # temurin source gradle build
            context: mini-baas-infra/docker/services/iceberg-rest
            build-args: ""
          - service: supavisor          # Elixir release → alpine
            context: mini-baas-infra/docker/services/supavisor
            build-args: ""
          - service: pg-meta            # node:20-slim source build
            context: mini-baas-infra/docker/services/pg-meta
            build-args: ""
          - service: studio             # node:22-slim next build (heavy)
            context: mini-baas-infra/docker/services/studio
            build-args: ""
          - service: mssql              # ubuntu + Microsoft apt mssql-server (heavy)
            context: mini-baas-infra/docker/services/mssql
            build-args: ""
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # The JVM/SQL-Server/Next.js images (trino, debezium, mssql, studio) peak at
      # 2–3 GiB during build; the stock runner has ~14 GiB free. Reclaim the
      # preinstalled Android/.NET/GHC/boost trees (~25 GiB) so heavy slims fit.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /usr/local/share/boost /usr/local/share/powershell \
                      /usr/lib/jvm "$AGENT_TOOLSDIRECTORY" 2>/dev/null || true
          df -h / | tail -1

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Restore Docker layer cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: /tmp/.buildx-cache/${{ matrix.service }}
          key: buildx-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            buildx-${{ matrix.service }}-

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: ${{ matrix.context }}
          build-args: ${{ matrix.build-args }}
          push: false
          tags: mini-baas/${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache/${{ matrix.service }}
          cache-to: type=local,dest=/tmp/.buildx-cache-new/${{ matrix.service }},mode=max

      - name: Rotate cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache/${{ matrix.service }}
          mv /tmp/.buildx-cache-new/${{ matrix.service }} /tmp/.buildx-cache/${{ matrix.service }} 2>/dev/null || true

  # ─── Job 3: Integration tests ──────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [shellcheck, docker-build]
    timeout-minutes: 25
    defaults:
      run:
        working-directory: mini-baas-infra
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Generate CI environment
        run: |
          set -euo pipefail
          FORCE=1 bash scripts/generate-env.sh .env
          # CI has no SMTP sink (mailpit is not a service in this compose), so GoTrue
          # 500s trying to send a signup confirmation email. Auto-confirm signups so
          # the phase tests can sign up and immediately log in. This is exactly what
          # the GOTRUE_MAILER_AUTOCONFIRM override exists for.
          echo "GOTRUE_MAILER_AUTOCONFIRM=true" >> .env
          # mongo-api ships NODE_ENV=production, which forces strict identity mode:
          # it then rejects the JWT-derived identity headers it sets for a Bearer
          # caller ("Raw identity headers are not trusted in strict mode"). Use the
          # dev/test default (compat) so phases 14/15 exercise real JWT-authenticated
          # Mongo CRUD — a missing/invalid JWT still yields no identity, hence 401.
          echo "IDENTITY_HEADER_MODE=compat" >> .env

      - name: Build and start core stack
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml build
          docker compose -f docker-compose.yml up -d
          # Mongo path for phases 14/15 — start the data-plane mongo services BY NAME
          # so realtime (same profile, builds from the SSH submodule) is never pulled.
          docker compose -f docker-compose.yml up -d mongo-keyfile mongo mongo-init mongo-api

      - name: Apply PostgreSQL migrations
        run: |
          set -euo pipefail
          # phases 3/4 query /rest/v1/users; public.users lives in 001_initial_schema.
          # db-bootstrap only seeds tenant_databases/schema_registry, so apply the
          # numbered migrations the way `make migrate` does (strip # comment lines).
          until docker compose -f docker-compose.yml exec -T postgres pg_isready -U postgres -d postgres >/dev/null 2>&1; do sleep 2; done
          for f in $(ls -1 scripts/migrations/postgresql/*.sql 2>/dev/null | sort); do
            echo "Applying: $f"
            sed '/^#/d' "$f" | docker compose -f docker-compose.yml exec -T postgres \
              psql -U postgres -d postgres -v ON_ERROR_STOP=1 -f -
          done
          # PostgREST cached its schema at startup (it depends_on db-bootstrap, which
          # runs BEFORE these migrations), so the migrated tables (users, posts,
          # user_profiles, …) aren't yet servable on /rest/v1 — phases 6/10 write to
          # them and get 404. Tell PostgREST to reload its schema cache.
          docker compose -f docker-compose.yml exec -T postgres \
            psql -U postgres -d postgres -c "NOTIFY pgrst, 'reload schema';"
          sleep 3

      - name: Wait for gateway + mongo-api health (max 150s each)
        run: |
          set -euo pipefail
          APIKEY=$(grep '^KONG_PUBLIC_API_KEY=' .env | cut -d= -f2-)
          wait_200() {
            local url="$1" name="$2" elapsed=0 code=000
            while [ "$elapsed" -lt 150 ]; do
              code=$(curl -sS -o /dev/null -w '%{http_code}' "$url" -H "apikey: $APIKEY" 2>/dev/null || echo 000)
              [ "$code" = "200" ] && { echo "$name healthy after ${elapsed}s"; return 0; }
              sleep 3; elapsed=$((elapsed + 3))
            done
            echo "$name health check failed after 150s (last=$code)"
            docker compose -f docker-compose.yml ps
            docker compose -f docker-compose.yml logs --tail=120
            return 1
          }
          wait_200 http://localhost:8000/auth/v1/health gateway
          wait_200 http://localhost:8000/mongo/v1/health mongo-api

      - name: Run test phases 1-4, 14, 15
        env:
          FORCE_COLORS: "0"
        run: |
          set -euo pipefail
          APIKEY=$(grep '^KONG_PUBLIC_API_KEY=' .env | cut -d= -f2-)
          # TEST_ORIGIN must match a Kong CORS-allowed origin (KONG_CORS_ORIGIN_APP)
          # or phase 2's preflight check sees no access-control-allow-origin header.
          export APIKEY PUBLIC_APIKEY="$APIKEY" BASE_URL="http://localhost:8000" TEST_ORIGIN="https://localhost:3000"
          rc_all=0
          # 5-8,10,16 use only /rest + /auth (the default stack); 14-15 are Mongo.
          # Phases 9 (storage) and 11-13 (realtime) need extra planes — added once
          # those services are wired into this job.
          for phase in 1 2 3 4 5 6 7 8 10 14 15 16; do
            script=$(ls scripts/phase${phase}-*.sh scripts/phase${phase}-*.py 2>/dev/null | head -1 || true)
            if [ -z "$script" ]; then
              echo "No test script for phase ${phase}, skipping"; continue
            fi
            echo "=== Running: $script ==="
            case "$script" in
              *.py) python3 "$script" || rc_all=1 ;;
              *)    bash    "$script" || rc_all=1 ;;
            esac
            sleep 1
          done
          [ "$rc_all" -eq 0 ] || { echo "Some test phases failed"; exit 1; }
          echo "All test phases passed"

      - name: Gateway query-path regression gate (m102)
        env:
          BASE_URL: http://localhost:8000
        run: |
          set -euo pipefail
          M102_APIKEY="$(grep '^KONG_PUBLIC_API_KEY=' .env | cut -d= -f2-)"
          export M102_APIKEY
          bash scripts/verify/m102-gateway-query-path.sh

      - name: Capture compose logs
        if: always()
        run: |
          mkdir -p artifacts
          docker compose -f docker-compose.yml ps    > artifacts/compose-ps.txt   2>&1 || true
          docker compose -f docker-compose.yml logs --no-color > artifacts/compose-logs.txt 2>&1 || true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ github.run_id }}
          path: mini-baas-infra/artifacts/
          retention-days: 7

      - name: Teardown stack
        if: always()
        run: docker compose -f docker-compose.yml down -v

  # ─── Job 4: Cloud / billing isolated gates (per-PR) ────────────
  # Each gate stands up its OWN scratch stack on a private $$-suffixed docker
  # network (postgres + redis + data-plane-router / orchestrator / tenant-control
  # built from source, plus an in-script mock-stripe where needed), asserts a
  # money/abuse/version contract, and tears it all down via an EXIT trap. No shared
  # stack, no external secrets — a green build actually proves quota enforcement,
  # spend caps, the abuse guard, the API-version contract, the cloud funnel and the
  # data-plane spend/suspend enforcement, not just the smoke phases.
  cloud-gates:
    name: Cloud gates (m101 m89 m90 m91 m94 m120)
    runs-on: ubuntu-latest
    needs: [shellcheck]
    timeout-minutes: 50
    defaults:
      run:
        working-directory: mini-baas-infra
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Run isolated cloud gates
        run: |
          set -uo pipefail
          rc_all=0
          # m101 first — its data-plane-router build warms the layer cache for the rest.
          for gate in m101-quota-realtenant m89-spend-caps m90-abuse-guard m91-api-version-contract m94-cloud-funnel; do
            script="scripts/verify/${gate}.sh"
            [ -f "$script" ] || { echo "missing $script — skipping"; continue; }
            echo "=== Running: $script ==="
            bash "$script" || { echo "$gate FAILED"; rc_all=1; }
          done
          [ "$rc_all" -eq 0 ] || { echo "Some cloud gates failed"; exit 1; }
          echo "All cloud gates passed"

      - name: Data-plane spend/suspend enforcement gate (m120)
        run: bash scripts/verify/run-gate-battery.sh m120

  # ─── Job 5: SDKs — build + test each SDK like a consumer ───────
  # Each SDK is exercised the way a consumer installs it. Python and Kotlin commit
  # their generated client. Dart's client (lib/) is gitignored, so we regenerate it
  # from the committed OpenAPI spec with the same generator before testing. Swift
  # targets Apple platforms (imports MobileCoreServices), so it builds on macOS.
  # JavaScript (@mini-baas/js) is the separate sdk-js-live job — its codegen and
  # type-tests need a running stack (the live /query/v1/engines matrix).
  sdk-tests:
    name: SDK ${{ matrix.sdk }}
    runs-on: ${{ matrix.os }}
    needs: [shellcheck]
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - { sdk: python, os: ubuntu-latest }
          - { sdk: kotlin, os: ubuntu-latest }
          - { sdk: dart,   os: ubuntu-latest }
          - { sdk: swift,  os: macos-latest }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # Python — grobase-sdk
      - if: matrix.sdk == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - if: matrix.sdk == 'python'
        working-directory: sdk-python
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
          python -m pytest -q

      # Kotlin — com.grobase:grobase-sdk (gradle wrapper is committed)
      - if: matrix.sdk == 'kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - if: matrix.sdk == 'kotlin'
        working-directory: sdk-kotlin
        run: |
          chmod +x ./gradlew
          ./gradlew build test --no-daemon

      # Dart — grobase. lib/ is gitignored, so regenerate the client from the
      # committed OpenAPI spec (same generator the committed tests came from), then
      # analyze + test the regenerated package.
      - if: matrix.sdk == 'dart'
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - if: matrix.sdk == 'dart'
        run: |
          docker run --rm -v "$PWD/mini-baas-infra/openapi:/spec:ro" -v "$PWD/sdk-dart:/out" \
            openapitools/openapi-generator-cli:latest generate \
            -i /spec/grobase-public.json -g dart -o /out --additional-properties=pubName=grobase
          # `dart analyze` proves the regenerated client compiles + type-checks. The
          # generator's auto-stub tests don't compile under the stable Dart test
          # runner, so they are not a meaningful gate; analyze is the real proof.
          cd sdk-dart && dart pub get && dart analyze

      # Swift — Grobase (Apple platforms; macOS runner ships Swift via Xcode).
      - if: matrix.sdk == 'swift'
        working-directory: sdk-swift
        run: swift build

  # ─── Job 6: Offers — compile each product shape like a user ─────
  # Prove the headline shapes a user can choose actually compile / are enforced:
  # the 5 MB binocle-nano + binocle-one single binaries, two compose editions via
  # the user-facing `make build EDITION=`, and the tier-manifest enforcement gate
  # (m28: packages.json is byte-parity with Go and enforced by the Rust data plane).
  offers:
    name: Offer ${{ matrix.offer }}
    runs-on: ubuntu-latest
    needs: [shellcheck]
    timeout-minutes: 40
    defaults:
      run:
        working-directory: mini-baas-infra
    strategy:
      fail-fast: false
      matrix:
        include:
          - { offer: nano-binary,      run: "make nano-build" }
          - { offer: one-binary,       run: "make one-build" }
          - { offer: edition-lean,     run: "make build EDITION=lean" }
          - { offer: edition-query,    run: "make build EDITION=query" }
          # Tier honesty: the package manifest's engine-allowlist / quota / alias /
          # override gating logic (the single source of truth behind every tier).
          # Self-contained (no live stack); the live data-plane enforcement of the
          # same masks is covered by the cloud-gates (m101 quota, m120 spend).
          - { offer: tier-gating,      run: "docker run --rm -v $PWD/go/control-plane:/src -w /src golang:1.25-bookworm go test ./internal/packages/" }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Generate env (edition builds interpolate .env)
        run: FORCE=1 bash scripts/generate-env.sh .env

      - name: Compile/enforce ${{ matrix.offer }}
        run: ${{ matrix.run }}

  # ─── Job 7: Full enterprise gate battery (nightly + manual) ─────
  # The heavy enterprise + parity suite (m103..m145): orgs/RBAC, audit chain,
  # hard-erase, IP allowlist, passkeys, SOC2 evidence, tenant export, SSO/OIDC,
  # SCIM, trust center, CMEK, read-replica, ABAC masks, compliance posture. Each
  # gate builds its own scratch stack and self-cleans. Runs on every push/PR (and
  # nightly) so the full enterprise suite is always part of the gate — never skipped.
  gates-full:
    name: Full gate battery (enterprise m103..m145)
    runs-on: ubuntu-latest
    needs: [shellcheck]
    timeout-minutes: 180
    defaults:
      run:
        working-directory: mini-baas-infra
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Run enterprise battery (m103..m145)
        env:
          BATTERY_KEEP_GOING: "1"   # run every gate, report all failures (not fail-fast)
        run: bash scripts/verify/run-gate-battery.sh --enterprise

      - name: Upload per-gate logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-battery-logs-${{ github.run_id }}
          path: mini-baas-infra/artifacts/gate-battery/
          retention-days: 14

  # ─── Job 8: Unit tests — the repo's own source-level tests ─────
  # The actual code tests a contributor runs: Go control-plane (go test ./...), the
  # Rust data-plane and realtime workspaces (cargo test), and the NestJS apps + libs
  # (jest). Run in containers (Docker-first), independent so they start immediately.
  unit-tests:
    name: Unit tests (${{ matrix.suite }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        suite: [go, rust-data-plane, rust-realtime, nestjs]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # Go — control plane (~30 packages)
      - if: matrix.suite == 'go'
        run: |
          docker run --rm -v "$PWD/mini-baas-infra/go/control-plane:/src" -w /src \
            golang:1.25-bookworm go test ./...

      # Rust — data-plane workspace (data-plane-core/pool/server + engine-conformance)
      - if: matrix.suite == 'rust-data-plane'
        run: |
          docker run --rm -v "$PWD/mini-baas-infra/docker/services/data-plane-router:/src" -w /src \
            rust:1-bookworm cargo test --workspace

      # Rust — realtime workspace (event bus + IRC bridge)
      - if: matrix.suite == 'rust-realtime'
        run: |
          docker run --rm -v "$PWD/mini-baas-infra/docker/services/realtime/realtime-agnostic:/src" -w /src \
            rust:1-bookworm cargo test --workspace

      # NestJS — apps + libs (jest)
      - if: matrix.suite == 'nestjs'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - if: matrix.suite == 'nestjs'
        working-directory: mini-baas-infra/src
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          npx jest
