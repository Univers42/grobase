# File: .github/workflows/ci.yml
# CI pipeline — shellcheck, Docker builds, integration tests
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # ─── Job 1: Shellcheck on repo-owned scripts ───────────────────
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Shellcheck repo scripts
        run: |
          set -euo pipefail
          # Lint the repo's own shell scripts: root host-helpers + mini-baas-infra.
          # Robust to a missing root (so a pruned path can't abort under set -e) and
          # prunes third-party/generated trees. Ignored codes: SC1091 (sourced file
          # not followed), SC2034 (unused vars — colour constants), SC1128 (the
          # uniform 42-school header banner above the shebang — cosmetic, scripts are
          # always invoked as `bash <file>` so the shebang line is never honoured).
          roots=()
          for d in scripts mini-baas-infra/scripts; do
            [ -d "$d" ] && roots+=("$d")
          done
          if [ "${#roots[@]}" -eq 0 ]; then
            echo "No script roots present; nothing to lint"; exit 0
          fi
          mapfile -d '' shfiles < <(
            find "${roots[@]}" \
              \( -path '*/vendor/*' -o -path '*/node_modules/*' -o -path '*/__pycache__/*' \) -prune \
              -o -type f -name '*.sh' -print0
          )
          if [ "${#shfiles[@]}" -eq 0 ]; then
            echo "No .sh files found"; exit 0
          fi
          printf '%s\0' "${shfiles[@]}" | xargs -0 shellcheck -S error -e SC1091 -e SC2034 -e SC1128
          echo "shellcheck passed on ${#shfiles[@]} files"

  # ─── Job 2: Docker build for each service ──────────────────────
  # Build contexts live under mini-baas-infra/. NestJS apps build from src/ with
  # an APP build-arg; the Go control plane from go/control-plane/ with APP+PORT;
  # the Rust data plane from its own dir. (The old flat ./docker/services/<svc>
  # layout never existed for these — every run errored "context not found".)
  docker-build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: mongo-api
            context: mini-baas-infra/src
            build-args: |
              APP=mongo-api
          - service: query-router
            context: mini-baas-infra/src
            build-args: |
              APP=query-router
          - service: email-service
            context: mini-baas-infra/src
            build-args: |
              APP=email-service
          - service: storage-router
            context: mini-baas-infra/src
            build-args: |
              APP=storage-router
          - service: adapter-registry
            context: mini-baas-infra/go/control-plane
            build-args: |
              APP=adapter-registry
              PORT=3021
          - service: data-plane-router   # Rust — slow cold build (minutes)
            context: mini-baas-infra/docker/services/data-plane-router
            build-args: ""
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Restore Docker layer cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: /tmp/.buildx-cache/${{ matrix.service }}
          key: buildx-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            buildx-${{ matrix.service }}-

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: ${{ matrix.context }}
          build-args: ${{ matrix.build-args }}
          push: false
          tags: mini-baas/${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache/${{ matrix.service }}
          cache-to: type=local,dest=/tmp/.buildx-cache-new/${{ matrix.service }},mode=max

      - name: Rotate cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache/${{ matrix.service }}
          mv /tmp/.buildx-cache-new/${{ matrix.service }} /tmp/.buildx-cache/${{ matrix.service }} 2>/dev/null || true

  # ─── Job 3: Integration tests ──────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [shellcheck, docker-build]
    timeout-minutes: 25
    defaults:
      run:
        working-directory: mini-baas-infra
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Generate CI environment
        run: |
          set -euo pipefail
          FORCE=1 bash scripts/generate-env.sh .env
          # CI has no SMTP sink (mailpit is not a service in this compose), so GoTrue
          # 500s trying to send a signup confirmation email. Auto-confirm signups so
          # the phase tests can sign up and immediately log in. This is exactly what
          # the GOTRUE_MAILER_AUTOCONFIRM override exists for.
          echo "GOTRUE_MAILER_AUTOCONFIRM=true" >> .env

      - name: Build and start core stack
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml build
          docker compose -f docker-compose.yml up -d
          # Mongo path for phases 14/15 — start the data-plane mongo services BY NAME
          # so realtime (same profile, builds from the SSH submodule) is never pulled.
          docker compose -f docker-compose.yml up -d mongo-keyfile mongo mongo-init mongo-api

      - name: Apply PostgreSQL migrations
        run: |
          set -euo pipefail
          # phases 3/4 query /rest/v1/users; public.users lives in 001_initial_schema.
          # db-bootstrap only seeds tenant_databases/schema_registry, so apply the
          # numbered migrations the way `make migrate` does (strip # comment lines).
          until docker compose -f docker-compose.yml exec -T postgres pg_isready -U postgres -d postgres >/dev/null 2>&1; do sleep 2; done
          for f in $(ls -1 scripts/migrations/postgresql/*.sql 2>/dev/null | sort); do
            echo "Applying: $f"
            sed '/^#/d' "$f" | docker compose -f docker-compose.yml exec -T postgres \
              psql -U postgres -d postgres -v ON_ERROR_STOP=1 -f -
          done

      - name: Wait for gateway + mongo-api health (max 150s each)
        run: |
          set -euo pipefail
          APIKEY=$(grep '^KONG_PUBLIC_API_KEY=' .env | cut -d= -f2-)
          wait_200() {
            local url="$1" name="$2" elapsed=0 code=000
            while [ "$elapsed" -lt 150 ]; do
              code=$(curl -sS -o /dev/null -w '%{http_code}' "$url" -H "apikey: $APIKEY" 2>/dev/null || echo 000)
              [ "$code" = "200" ] && { echo "$name healthy after ${elapsed}s"; return 0; }
              sleep 3; elapsed=$((elapsed + 3))
            done
            echo "$name health check failed after 150s (last=$code)"
            docker compose -f docker-compose.yml ps
            docker compose -f docker-compose.yml logs --tail=120
            return 1
          }
          wait_200 http://localhost:8000/auth/v1/health gateway
          wait_200 http://localhost:8000/mongo/v1/health mongo-api

      - name: Run test phases 1-4, 14, 15
        env:
          FORCE_COLORS: "0"
        run: |
          set -euo pipefail
          APIKEY=$(grep '^KONG_PUBLIC_API_KEY=' .env | cut -d= -f2-)
          # TEST_ORIGIN must match a Kong CORS-allowed origin (KONG_CORS_ORIGIN_APP)
          # or phase 2's preflight check sees no access-control-allow-origin header.
          export APIKEY PUBLIC_APIKEY="$APIKEY" BASE_URL="http://localhost:8000" TEST_ORIGIN="https://localhost:3000"
          rc_all=0
          for phase in 1 2 3 4 14 15; do
            script=$(ls scripts/phase${phase}-*.sh scripts/phase${phase}-*.py 2>/dev/null | head -1 || true)
            if [ -z "$script" ]; then
              echo "No test script for phase ${phase}, skipping"; continue
            fi
            echo "=== Running: $script ==="
            case "$script" in
              *.py) python3 "$script" || rc_all=1 ;;
              *)    bash    "$script" || rc_all=1 ;;
            esac
            sleep 1
          done
          [ "$rc_all" -eq 0 ] || { echo "Some test phases failed"; exit 1; }
          echo "All test phases passed"

      - name: Gateway query-path regression gate (m102)
        env:
          BASE_URL: http://localhost:8000
        run: |
          set -euo pipefail
          M102_APIKEY="$(grep '^KONG_PUBLIC_API_KEY=' .env | cut -d= -f2-)"
          export M102_APIKEY
          bash scripts/verify/m102-gateway-query-path.sh

      - name: Capture compose logs
        if: always()
        run: |
          mkdir -p artifacts
          docker compose -f docker-compose.yml ps    > artifacts/compose-ps.txt   2>&1 || true
          docker compose -f docker-compose.yml logs --no-color > artifacts/compose-logs.txt 2>&1 || true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ github.run_id }}
          path: mini-baas-infra/artifacts/
          retention-days: 7

      - name: Teardown stack
        if: always()
        run: docker compose -f docker-compose.yml down -v
