primary_region = "cdg"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "src/Dockerfile"
  [build.args]
    APP = "query-router"

[env]
  PORT = "4001"
  ADAPTER_REGISTRY_URL = "http://mini-baas-adapter-registry.internal:3020"
  PERMISSION_ENGINE_URL = "http://mini-baas-permission-engine.internal:3050"
  LOG_SERVICE_URL = "http://mini-baas-log-service.internal:3110"
  CONTROL_PLANE_TIMEOUT_MS = "2000"
  CONTROL_PLANE_RETRY_ATTEMPTS = "2"
  QUERY_ROUTER_ADAPTER_CACHE_TTL_MS = "30000"
  QUERY_ROUTER_PERMISSION_CACHE_TTL_MS = "5000"
  QUERY_ROUTER_READ_CACHE_TTL_MS = "3000"
  QUERY_ROUTER_CACHE_MAX_ENTRIES = "2000"
  QUERY_ROUTER_ASYNC_EVENTS_ENABLED = "true"
  QUERY_ROUTER_ASYNC_EVENT_FLUSH_MS = "1000"
  QUERY_ROUTER_ASYNC_EVENT_BATCH_SIZE = "25"
  QUERY_ROUTER_ASYNC_EVENT_MAX_ENTRIES = "1000"
  LOG_LEVEL = "info"

[checks.live]
  type = "http"
  port = 4001
  method = "GET"
  path = "/health/live"
  interval = "15s"
  timeout = "3s"
  grace_period = "30s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
