# MovieVerse static frontend — nginx serves the SPA and, so the browser stays
# SAME-ORIGIN (no CORS), reverse-proxies the three Grobase surfaces to Kong:
#   /auth/v1 (GoTrue) · /rest/v1 (PostgREST + RLS) · /tmdb/v1 (Go catalog proxy).
# The site ships only the PUBLIC anon key (config.js) — RLS enforces real access.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve Kong via Docker's embedded DNS every 10s, so if Kong is recreated
    # (new container IP — e.g. bringing up another app profile) we follow it instead
    # of caching a dead IP and returning 502. proxy_pass with a variable forces the
    # runtime lookup; the original request URI (/auth/v1/…, /rest/v1/…, /tmdb/v1/…)
    # is preserved.
    resolver 127.0.0.11 valid=10s ipv6=off;
    location /auth/ { set $kong kong; proxy_pass http://$kong:8000; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $remote_addr; }
    location /rest/ { set $kong kong; proxy_pass http://$kong:8000; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $remote_addr; }
    location /tmdb/ { set $kong kong; proxy_pass http://$kong:8000; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $remote_addr; }

    # App assets aren't fingerprinted — never cache, so a fix isn't masked.
    location ~* \.(?:css|js|mjs|png|jpe?g|gif|svg|ico|webp|woff2?)$ {
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    # SPA: every other path renders the client shell (hash-routed inside).
    location / {
        add_header Cache-Control "no-store";
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /index.html;
}
