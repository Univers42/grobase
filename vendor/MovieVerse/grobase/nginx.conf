# MovieVerse static frontend — nginx serves the de-Thymeleafed client site and
# preserves the original Spring URL structure (/peliculas/{id}, /series/{id}, …)
# via try_files rewrites, so existing in-page links keep working. The site talks
# only to Kong (/auth/v1, /rest/v1, /tmdb/v1); nginx serves files, nothing else.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Dev: never cache JS/CSS/assets — the app files aren't fingerprinted, so a
    # stale cached module (e.g. an old grobase-client.js) would mask code fixes.
    # Switch to long-cache + content hashing for a real production deploy.
    location ~* \.(?:css|js|mjs|png|jpe?g|gif|svg|ico|webp|woff2?)$ {
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    # Original Spring routes → their static page (no-store so auth state is fresh).
    location = /            { add_header Cache-Control "no-store"; try_files /index.html =404; }
    location = /login       { add_header Cache-Control "no-store"; try_files /login.html =404; }
    location = /register    { add_header Cache-Control "no-store"; try_files /register.html =404; }
    location = /perfil      { add_header Cache-Control "no-store"; try_files /profile.html =404; }
    location = /dashboard   { add_header Cache-Control "no-store"; try_files /dashboard.html =404; }
    location = /peliculas   { add_header Cache-Control "no-store"; try_files /movies.html =404; }
    location = /series      { add_header Cache-Control "no-store"; try_files /series.html =404; }
    location ^~ /peliculas/ { add_header Cache-Control "no-store"; try_files /movie.html =404; }
    location ^~ /series/    { add_header Cache-Control "no-store"; try_files /serie.html =404; }

    location / {
        add_header Cache-Control "no-store";
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /404.html;
}
