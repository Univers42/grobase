services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - ./public/uploads:/var/www/html/public/uploads
    depends_on:
      - php
    restart: unless-stopped

  php:
    build:
      context: .
      dockerfile: php/Dockerfile
    volumes:
      - .:/var/www/html
      - ./public/uploads:/var/www/html/public/uploads
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      - DB_HOST=${DB_HOST:-mariadb}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-camagru}
      - DB_USER=${DB_USER:-camagru}
      - DB_PASS=${DB_PASS:-camagru_secret}
      - APP_URL=${APP_URL:-http://localhost:8080}
      - APP_ENV=${APP_ENV:-development}
      - APP_SECRET=${APP_SECRET:-change_me}
      - MAIL_FROM=${MAIL_FROM:-noreply@camagru.local}
      - MAIL_HOST=${MAIL_HOST:-mailpit}
      - MAIL_PORT=${MAIL_PORT:-1025}
    restart: unless-stopped

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root_secret
      MARIADB_DATABASE: ${DB_NAME:-camagru}
      MARIADB_USER: ${DB_USER:-camagru}
      MARIADB_PASSWORD: ${DB_PASS:-camagru_secret}
    volumes:
      - dbdata:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8026:8025"
      - "1026:1025"
    restart: unless-stopped

volumes:
  dbdata:
