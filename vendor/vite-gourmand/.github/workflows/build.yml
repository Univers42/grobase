name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

      - name: Fetch SonarQube Cloud JSON results
        if: always() && env.SONAR_TOKEN != ''
        run: bash infrastructure/sonarcloud/fetch-results.sh infrastructure/sonarcloud/results

      - name: Summarize SonarQube Cloud results
        if: always() && env.SONAR_TOKEN != ''
        run: node infrastructure/sonarcloud/summarize-results.js infrastructure/sonarcloud/results

      - name: Upload SonarQube Cloud JSON results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: sonarqube-cloud-results
          path: infrastructure/sonarcloud/results/*.json
          if-no-files-found: ignore