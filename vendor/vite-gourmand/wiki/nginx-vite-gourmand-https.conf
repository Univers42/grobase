# Nginx HTTPS template for vite-gourmand.fr
# Replace certificate paths with the CA-issued certificate files on the server.

server {
    listen 80;
    listen [::]:80;
    server_name vite-gourmand.fr www.vite-gourmand.fr;
    return 308 https://vite-gourmand.fr$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.vite-gourmand.fr;

    ssl_certificate /etc/letsencrypt/live/vite-gourmand.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vite-gourmand.fr/privkey.pem;

    return 308 https://vite-gourmand.fr$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vite-gourmand.fr;

    ssl_certificate /etc/letsencrypt/live/vite-gourmand.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vite-gourmand.fr/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "upgrade-insecure-requests" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;

    root /var/www/vite-gourmand/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}