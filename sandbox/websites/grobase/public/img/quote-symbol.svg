<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160" role="img" aria-labelledby="qs-title" fill="none">
  <title id="qs-title">Decorative quotation mark</title>
  <defs>
    <linearGradient id="qs-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff3af2"/>
      <stop offset="0.55" stop-color="#7b2fff"/>
      <stop offset="1" stop-color="#00f5d4"/>
    </linearGradient>
  </defs>
  <!-- two opening quote glyphs: a comma-shaped fill with an inner counter -->
  <g fill="url(#qs-fill)">
    <path d="M82 24
             C44 30 16 62 16 108
             C16 134 34 152 60 152
             C84 152 100 134 100 110
             C100 88 84 72 62 72
             C58 72 54 73 50 75
             C56 52 74 38 96 33
             Z"/>
    <path d="M180 24
             C142 30 114 62 114 108
             C114 134 132 152 158 152
             C182 152 198 134 198 110
             C198 88 182 72 160 72
             C156 72 152 73 148 75
             C154 52 172 38 194 33
             Z"/>
  </g>
</svg>
