<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-labelledby="dm-title" fill="none">
  <title id="dm-title">Abstract analytics dashboard mockup</title>
  <defs>
    <linearGradient id="dm-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1330"/>
      <stop offset="1" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="dm-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00f5d4"/>
      <stop offset="0.5" stop-color="#ff3af2"/>
      <stop offset="1" stop-color="#ffe600"/>
    </linearGradient>
    <linearGradient id="dm-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff3af2" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#ff3af2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dm-bar-a" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#7b2fff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#00f5d4"/>
    </linearGradient>
    <linearGradient id="dm-bar-b" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#7b2fff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ff6b35"/>
    </linearGradient>
    <linearGradient id="dm-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00f5d4"/>
      <stop offset="1" stop-color="#7b2fff"/>
    </linearGradient>
    <radialGradient id="dm-glow" cx="0.5" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#7b2fff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#7b2fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- canvas -->
  <rect width="1280" height="720" rx="28" fill="url(#dm-panel)"/>
  <rect width="1280" height="720" rx="28" fill="url(#dm-glow)"/>
  <rect x="1.5" y="1.5" width="1277" height="717" rx="26.5" stroke="#ffffff" stroke-opacity="0.10" stroke-width="3"/>

  <!-- top bar -->
  <circle cx="58" cy="60" r="12" fill="#ff3af2"/>
  <circle cx="92" cy="60" r="12" fill="#00f5d4"/>
  <circle cx="126" cy="60" r="12" fill="#ffe600"/>
  <rect x="170" y="48" width="220" height="24" rx="12" fill="#ffffff" fill-opacity="0.12"/>
  <rect x="980" y="44" width="260" height="32" rx="16" fill="#ffffff" fill-opacity="0.06"/>
  <rect x="996" y="54" width="150" height="12" rx="6" fill="#ffffff" fill-opacity="0.22"/>
  <circle cx="1216" cy="60" r="16" fill="url(#dm-ring)"/>

  <!-- KPI cards -->
  <g>
    <rect x="40" y="116" width="280" height="124" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#ff3af2" stroke-opacity="0.55" stroke-width="2"/>
    <rect x="64" y="142" width="96" height="10" rx="5" fill="#ffffff" fill-opacity="0.42"/>
    <rect x="64" y="166" width="150" height="30" rx="8" fill="#ff3af2"/>
    <rect x="64" y="210" width="60" height="10" rx="5" fill="#00f5d4"/>
    <path d="M236 214 l10 -10 l10 10" stroke="#00f5d4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g>
    <rect x="340" y="116" width="280" height="124" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#00f5d4" stroke-opacity="0.55" stroke-width="2"/>
    <rect x="364" y="142" width="120" height="10" rx="5" fill="#ffffff" fill-opacity="0.42"/>
    <rect x="364" y="166" width="120" height="30" rx="8" fill="#00f5d4"/>
    <rect x="364" y="210" width="60" height="10" rx="5" fill="#ffe600"/>
    <path d="M536 214 l10 -10 l10 10" stroke="#ffe600" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g>
    <rect x="640" y="116" width="280" height="124" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#ffe600" stroke-opacity="0.55" stroke-width="2"/>
    <rect x="664" y="142" width="84" height="10" rx="5" fill="#ffffff" fill-opacity="0.42"/>
    <rect x="664" y="166" width="170" height="30" rx="8" fill="#ffe600"/>
    <rect x="664" y="210" width="60" height="10" rx="5" fill="#ff6b35"/>
    <path d="M836 204 l10 10 l10 -10" stroke="#ff6b35" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- radial KPI card -->
  <g>
    <rect x="940" y="116" width="300" height="124" rx="18" fill="#ffffff" fill-opacity="0.05" stroke="#7b2fff" stroke-opacity="0.55" stroke-width="2"/>
    <circle cx="1004" cy="178" r="40" stroke="#ffffff" stroke-opacity="0.10" stroke-width="12" fill="none"/>
    <circle cx="1004" cy="178" r="40" stroke="url(#dm-ring)" stroke-width="12" fill="none"
            stroke-linecap="round" stroke-dasharray="188 251" transform="rotate(-90 1004 178)"/>
    <rect x="1072" y="150" width="140" height="12" rx="6" fill="#ffffff" fill-opacity="0.42"/>
    <rect x="1072" y="178" width="100" height="22" rx="8" fill="#b388ff"/>
    <rect x="1072" y="210" width="70" height="10" rx="5" fill="#ffffff" fill-opacity="0.30"/>
  </g>

  <!-- main line/area chart -->
  <g>
    <rect x="40" y="268" width="600" height="320" rx="20" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
    <rect x="64" y="292" width="180" height="14" rx="7" fill="#ffffff" fill-opacity="0.38"/>
    <!-- gridlines -->
    <line x1="72" y1="356" x2="616" y2="356" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>
    <line x1="72" y1="424" x2="616" y2="424" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>
    <line x1="72" y1="492" x2="616" y2="492" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>
    <line x1="72" y1="552" x2="616" y2="552" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>
    <!-- area fill -->
    <path d="M72 510 L150 470 L228 496 L306 420 L384 446 L462 372 L540 398 L616 336 L616 552 L72 552 Z" fill="url(#dm-area)"/>
    <!-- line -->
    <path d="M72 510 L150 470 L228 496 L306 420 L384 446 L462 372 L540 398 L616 336"
          stroke="url(#dm-line)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- nodes -->
    <circle cx="306" cy="420" r="7" fill="#0d0d1a" stroke="#ff3af2" stroke-width="4"/>
    <circle cx="462" cy="372" r="7" fill="#0d0d1a" stroke="#00f5d4" stroke-width="4"/>
    <circle cx="616" cy="336" r="8" fill="#ffe600"/>
  </g>

  <!-- bar chart -->
  <g>
    <rect x="660" y="268" width="580" height="320" rx="20" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
    <rect x="684" y="292" width="150" height="14" rx="7" fill="#ffffff" fill-opacity="0.38"/>
    <line x1="692" y1="552" x2="1216" y2="552" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>
    <rect x="712"  y="452" width="44" height="100" rx="10" fill="url(#dm-bar-a)"/>
    <rect x="784"  y="404" width="44" height="148" rx="10" fill="url(#dm-bar-b)"/>
    <rect x="856"  y="486" width="44" height="66"  rx="10" fill="url(#dm-bar-a)"/>
    <rect x="928"  y="372" width="44" height="180" rx="10" fill="url(#dm-bar-b)"/>
    <rect x="1000" y="430" width="44" height="122" rx="10" fill="url(#dm-bar-a)"/>
    <rect x="1072" y="346" width="44" height="206" rx="10" fill="url(#dm-bar-b)"/>
    <rect x="1144" y="408" width="44" height="144" rx="10" fill="url(#dm-bar-a)"/>
    <!-- legend -->
    <circle cx="1052" cy="300" r="7" fill="#00f5d4"/>
    <rect x="1066" y="294" width="48" height="12" rx="6" fill="#ffffff" fill-opacity="0.30"/>
    <circle cx="1140" cy="300" r="7" fill="#ff6b35"/>
    <rect x="1154" y="294" width="48" height="12" rx="6" fill="#ffffff" fill-opacity="0.30"/>
  </g>
</svg>
