  <text x="12" y="450" font-family="sans-serif" font-size="10" fill="#94a3b8">n/a (omitted): supabase-selfhost (Self-host has no per-tenant price (you run it). Its INFRA cost on Fly would be modelable from its 2884 MiB RSS (~3–4 GB VM ≈ $20–25/mo for ONE project, since Supabase self-host is single-project), but that is per-project not per-tenant — left na to avoid a misleading per-tenant figure.); supabase-cloud (Supabase Cloud prices per-PROJECT + usage (e.g. published Free / Pro $25/project/mo base + compute/usage add-ons), not per-tenant. A $/tenant comparison would be apples-to-oranges; na with this note rather than fabricate.); firebase (Firebase prices per-usage (reads/writes/storage/egress) and Identity Platform per-MAU (50K free then per-MAU) — no per-tenant unit. na with this note.)</text>
