  <text x="62" y="192.0" text-anchor="end" font-family="sans-serif" font-size="11" fill="#64748b">4,557</text>
  <line x1="70" y1="126.0" x2="680" y2="126.0" stroke="#e2e8f0" stroke-width="1"/>
  <text x="62" y="130.0" text-anchor="end" font-family="sans-serif" font-size="11" fill="#64748b">6,077</text>
  <line x1="70" y1="64.0" x2="680" y2="64.0" stroke="#e2e8f0" stroke-width="1"/>
  <text x="62" y="68.0" text-anchor="end" font-family="sans-serif" font-size="11" fill="#64748b">7,596</text>
