  <text x="698" y="232" font-family="sans-serif" font-size="10" fill="#64748b">(higher is better)</text>

  <text x="12" y="450" font-family="sans-serif" font-size="10" fill="#94a3b8">n/a (omitted): grobase-basic (No dedicated basic-tier capacity artifact.); grobase-pro (No dedicated pro-tier capacity artifact captured (budgets.json advertises 200 rps as a smoke bar, but that is a budget, not a measured ceiling).); grobase-max (No dedicated max-tier capacity artifact captured (budgets.json holds 800 rps as a placeholder smoke bar pending a true measurement).); supabase-selfhost (The head-to-head measured latency only; no sustained-RPS ramp was run against Supabase. Left na.); supabase-cloud (Not measured; vendor publishes plan limits, not a comparable sustained-RPS.); firebase (Not measured; Firebase autoscales — there is no fixed self-host RPS ceiling.)</text>
</svg>