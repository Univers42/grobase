  <text x="440" y="28" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0f172a">Read p95 vs tenant count (under zipf load)</text>
  <text x="440" y="48" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#64748b">p95 of the zipf-distributed multitenant read workload as the fleet grows. CRITICAL HONESTY: these p95 values are k6/Chrome-CPU-bound on the shared box (scale-slo.md §2/§5), NOT stack latency — the SERVER-side facts (0 5xx, 1 pool, flat RSS) are the real result. The flat ~2.4 ms warm-read SLO comes from the single-tenant capacity run, unchanged at density because pool count is independent of tenant count.  ·  (ms)</text>

