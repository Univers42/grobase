# Prometheus scrape configuration for mini-BaaS
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Platform alert rules (Track-2 E2). Mounted at /etc/prometheus/rules.
rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: "kong"
    static_configs:
      - targets: ["kong:8001"]
    metrics_path: /metrics

  - job_name: "mongo-api"
    static_configs:
      - targets: ["mongo-api:3010"]
    metrics_path: /metrics

  # Go control plane — dependency-free /metrics exposed by internal/shared
  # (baas_http_requests_total, baas_http_request_duration_ms_avg, baas_service_up,
  # baas_uptime_seconds). See wiki/05-orchestration-observability-roadmap.md §2.
  - job_name: "go-control-plane"
    metrics_path: /metrics
    static_configs:
      - targets: ["adapter-registry-go:3021"]
        labels: { plane: "control", service: "adapter-registry" }
      - targets: ["tenant-control:3022"]
        labels: { plane: "control", service: "tenant-control" }
      - targets: ["webhook-dispatcher:3025"]
        labels: { plane: "control", service: "webhook-dispatcher" }

  # NOTE: query-router HTTP metrics are still collected via Kong's prometheus plugin.

  # Rust data plane — dependency-free /metrics: baas_service_up, baas_uptime_seconds,
  # baas_http_requests_total{status}, baas_data_plane_pool_connections{mount,engine,state}.
  - job_name: "rust-data-plane"
    metrics_path: /metrics
    static_configs:
      - targets: ["data-plane-router-rust:4011"]
        labels: { plane: "data", service: "data-plane-router" }

  - job_name: "permission-engine"
    static_configs:
      - targets: ["permission-engine:3050"]
    metrics_path: /metrics

  - job_name: "schema-service"
    static_configs:
      - targets: ["schema-service:3060"]
    metrics_path: /metrics

  - job_name: "vault"
    metrics_path: /v1/sys/metrics
    params:
      format: ["prometheus"]
    scheme: http
    static_configs:
      - targets: ["vault:8200"]

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres:5432"]
    metrics_path: /metrics

  # Realtime gateway — dependency-free /metrics (Track-2 C4):
  # baas_realtime_events_dropped_total{reason}, _dispatched_total,
  # _slow_consumers_disconnected_total. Opt-in service (profile realtime); a
  # "down" target is expected when realtime isn't deployed.
  - job_name: "realtime"
    metrics_path: /metrics
    static_configs:
      - targets: ["realtime:4000"]
        labels: { plane: "realtime", service: "realtime" }

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
