# secrets plane — vault, vault-init
services:
  vault:
    extends: { file: orchestrators/compose/base/_common.yml, service: base }
    image: ghcr.io/univers42/grobase-vault:latest # pull-fallback (built from ./build context below)
    build:
      context: ./infra/docker/services/vault
      dockerfile: Dockerfile
    profiles: [control-plane]
    container_name: mini-baas-vault
    cap_add:
      - IPC_LOCK
    command: vault server -config=/vault/config/vault.hcl
    environment:
      SKIP_SETCAP: "1"
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_API_ADDR: http://0.0.0.0:8200
    ports:
      - "127.0.0.1:${VAULT_PORT:-8200}:8200"
    volumes:
      - vault-data:/vault/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "vault status -address=http://127.0.0.1:8200 2>/dev/null | grep -q 'Sealed.*false' || exit 1",
        ]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 10
    mem_limit: 256m
    cpus: 0.5

  # ─── Vault Bootstrap (control plane one-shot) ─────────────────────
  vault-init:
    extends: { file: orchestrators/compose/base/_common.yml, service: base }
    image: ghcr.io/univers42/grobase-vault-init:latest # pull-fallback (built from ./build context below)
    build:
      context: ./infra/docker/services/vault
      dockerfile: Dockerfile
    profiles: [control-plane]
    container_name: mini-baas-vault-init
    env_file: [.env]
    environment:
      VAULT_ADDR: http://vault:8200
    entrypoint: /vault/scripts/init-vault.sh
    volumes:
      - vault-data:/vault/data
    depends_on:
      vault:
        condition: service_started
    restart: "no"

  # ─── API Gateway ─────────────────────────────────────────────────
