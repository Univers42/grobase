# playground plane — playground
services:
  playground:
    # No healthcheck BY DESIGN: dev-only static playground whose content is
    # optional (./playground assets) — a content probe would flap on a bare
    # checkout. Never part of a production edition.
    image: nginx:1.27-alpine
    container_name: mini-baas-playground
    profiles: ["playground"]
    ports:
      - "3100:80"
    volumes:
      - ./playground:/usr/share/nginx/html
      - ./playground/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      kong:
        condition: service_started
    networks:
      - mini-baas
    restart: unless-stopped

